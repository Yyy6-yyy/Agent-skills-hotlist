name: Update skill hotlist

on:
  schedule:
    - cron: "25 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/update-real-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILLS_SH_TOKEN: ${{ secrets.SKILLS_SH_TOKEN }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
      - name: Commit refreshed hotlist
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily skill hotlist"
          file_pattern: data/skills-latest.json data/snapshots/*.json public/index.html
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload public site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
